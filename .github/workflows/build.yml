name: Build and Benchmark

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ python3 python3-pip
      - name: Build
        run: |
          mkdir build && cd build
          cmake ..
          make -j$(nproc)
      - name: Run Benchmark
        run: ./build/benchmark
      - name: Plot Results
        run: python3 scripts/plot_results.py